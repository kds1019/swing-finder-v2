name: Check Alerts

on:
  # Run every 2 hours during market hours (10 AM, 12 PM, 2 PM, 4:15 PM ET)
  schedule:
    - cron: '0 15 * * 1-5'  # 10:00 AM ET (15:00 UTC)
    - cron: '0 17 * * 1-5'  # 12:00 PM ET (17:00 UTC)
    - cron: '0 19 * * 1-5'  # 2:00 PM ET (19:00 UTC)
    - cron: '15 21 * * 1-5' # 4:15 PM ET (21:15 UTC)
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy
      
      - name: Check alerts
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python check_alerts.py

